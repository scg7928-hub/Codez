[build]
  command = "npm i -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/codez run build"
  publish = "frontend/dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22.22.3"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
